<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="icon" href="data:;base64,iVBORw0KGgo= ">
  </head>
  <body>
    <div class="app-container">
      <header>
        <div class="brand">
          <h1>Weather-Real_Time</h1>
        </div>
        <div class="header-controls">
          <div id="date-time-display" class="date-time"></div>
          <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
        </div>
      </header>

      <main class="dashboard-layout">
        <section class="search-sidebar">
          <form id="search-form" class="search-form">
            <div class="input-group">
              <input
                type="text"
                id="city-input"
                placeholder="Search for a city..."
                required
                autocomplete="off"
              />
              <button type="submit" aria-label="Search">
                <i class="fas fa-search"></i>
              </button>
            </div>
          </form>

          <div class="history-container">
            <h3>Recent Searches</h3>
            <div id="recent-searches-list" class="history-list"></div>
          </div>
        </section>

        <section class="weather-display">
          <div id="loading-spinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Fetching weather data.....</p>
          </div>

          <div id="error-message" class="error-card hidden">
            <i class="fas fa-exclamation-triangle"></i>
            <p id="error-text">City not found. Please try again.</p>
          </div>

          <div id="weather-placeholder" class="weather-placeholder">
            <i class="fas fa-cloud-sun"></i>
            <p>Enter a city name to explore weather information.</p>
          </div>

          <div id="weather-content" class="weather-card hidden">
            <div class="weather-main-info">
              <div class="location-meta">
                <h2 id="city-name">Mumbai, IN</h2>
                <p id="weather-description">Scattered Clouds</p>
              </div>
              <div class="weather-visual">
                <img id="weather-icon" src="" alt="Weather Status Icon" />
                <span id="current-temperature">28°C</span>
              </div>
            </div>

            <div class="weather-metrics-grid">
              <div class="metric-card">
                <i class="fas fa-droplet"></i>
                <div class="metric-info">
                  <span>Humidity</span>
                  <strong id="humidity-value">72%</strong>
                </div>
              </div>
              <div class="metric-card">
                <i class="fas fa-wind"></i>
                <div class="metric-info">
                  <span>Wind Speed</span>
                  <strong id="wind-speed-value">14 km/h</strong>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
